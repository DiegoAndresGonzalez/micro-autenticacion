server:
  port: 8080
spring:
  application:
    name: "Autenticacion"
  r2dbc:
    host: "localhost"
    port: "5432"
    database: "test1"
    schema: "public"
    username: "postgres"
    password: "1234"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "https://idp.example.com/issuer"
          client-id: "myclientid"
jwt:
  json-exp-roles: "/roles"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"